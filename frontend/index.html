<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="shortcut icon" href="logo/logo.jpeg" type="image/x-icon">
</head>
<body>
    <div class="container-header">
        <div class="container-btn       ">
            <button class="btn-girar" onclick="girar()">Girar</button>
        </div>
        <div class="container-theme">
            <button class="btn-dark" onclick="trocarTema()" id="btn-dark">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-moon-fill" viewBox="0 0 16 16" >
                    <path d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278"/>
                </svg>
            </button>
            <button class="btn-light display-none" onclick="trocarTema()" id="btn-light">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lightbulb" viewBox="0 0 16 16" >
                    <path d="M2 6a6 6 0 1 1 10.174 4.31c-.203.196-.359.4-.453.619l-.762 1.769A.5.5 0 0 1 10.5 13a.5.5 0 0 1 0 1 .5.5 0 0 1 0 1l-.224.447a1 1 0 0 1-.894.553H6.618a1 1 0 0 1-.894-.553L5.5 15a.5.5 0 0 1 0-1 .5.5 0 0 1 0-1 .5.5 0 0 1-.46-.302l-.761-1.77a2 2 0 0 0-.453-.618A5.98 5.98 0 0 1 2 6m6-5a5 5 0 0 0-3.479 8.592c.263.254.514.564.676.941L5.83 12h4.342l.632-1.467c.162-.377.413-.687.676-.941A5 5 0 0 0 8 1"/>
                </svg>
            </button>
        </div>
    </div>
    <div class="pai-roleta">
        <div class="container-roleta">
            <div class="ponteiro" id="ponteiro"></div>
            <div class="roleta-exercicios" id="roleta">
                
                <span class="texto t1">Flexão</span>
                <span class="texto t2">Agachamento</span>
                <span class="texto t3">Abdominal</span>
                <span class="texto t4">Polichinelo</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
